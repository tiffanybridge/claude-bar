name: Build and Release

# Automatically builds a .dmg and creates a GitHub release whenever you push a version tag.
# To release: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x scripts/build-dmg.sh

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeBar.dmg
          generate_release_notes: true
